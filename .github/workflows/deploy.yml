name: CI/CD Deploy Streamlit App

on:
  push:
    branches:
      - main

env:
  ACR_NAME: nlpacr12345
  IMAGE_NAME: streamlit-app
  RESOURCE_GROUP: nlp-project-rg
  CONTAINER_APP_NAME: streamlit-app

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.STREAMLITAPP_AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.STREAMLITAPP_AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.STREAMLITAPP_AZURE_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: az acr login --name ${{ env.ACR_NAME }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest .
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

    - name: Deploy to Container App
      run: |
        az containerapp update \
          --name ${{ env.CONTAINER_APP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
